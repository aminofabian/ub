components:
  schemas:
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 191
          minLength: 0
        name:
          type: string
          maxLength: 255
          minLength: 0
        phone:
          type: string
          maxLength: 50
          minLength: 0
        roleId:
          type: string
          maxLength: 36
          minLength: 0
        branchId:
          type: string
          maxLength: 36
          minLength: 0
        status:
          type: string
          maxLength: 32
          minLength: 0
        password:
          type: string
          maxLength: 191
          minLength: 8
        pin:
          type: string
          pattern: \d{4,6}
      required:
      - email
      - name
      - roleId
    RoleSummary:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        system:
          type: boolean
    UserResponse:
      type: object
      properties:
        id:
          type: string
        businessId:
          type: string
        branchId:
          type: string
        email:
          type: string
        name:
          type: string
        phone:
          type: string
        status:
          type: string
        role:
          $ref: '#/components/schemas/RoleSummary'
        permissions:
          type: array
          items:
            type: string
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssignRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          maxLength: 36
          minLength: 0
      required:
      - roleId
    CreateBusinessRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 0
        slug:
          type: string
          maxLength: 191
          minLength: 0
          pattern: ^[a-zA-Z0-9-]+$
        currency:
          type: string
          maxLength: 3
          minLength: 3
        countryCode:
