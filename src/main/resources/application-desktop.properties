# ---------------------------------------------------------------------------
# Desktop / offline profile (DESKTOP_INSTALLATION.md §5.1 + §7).
#
# Activated by the Tauri shell (or `SPRING_PROFILES_ACTIVE=desktop ./gradlew
# bootRun` for local dev). The cloud profile in `application.properties` binds
# to port 5050 and MySQL on 3306; this file overrides those to bind the HTTP
# listener to loopback, point JPA at the bundled MariaDB on 33306, and disable
# every cloud integration.
# ---------------------------------------------------------------------------

# Loopback-only by default; the Settings → "Share on LAN" toggle (§11) will
# flip this to 0.0.0.0 in a later step.
server.address=${APP_DESKTOP_BIND:127.0.0.1}

# Bundled MariaDB (DESKTOP_INSTALLATION.md §7). On a packaged install the
# Tauri shell extracts `mariadb-10.11-<os>-<arch>.tar.gz`, runs
# `mariadb-install-db`, generates a random password and exports
# APP_DESKTOP_DB_PASSWORD before launching the JVM. For developer dev — where
# step 4 is the first time we talk to a real MariaDB — the defaults below let
# `./gradlew bootRun -Pdesktop=true` connect to a local docker MariaDB
# (see DESKTOP_INSTALLATION.md §16 step 4 for the smoke-test recipe).
#
# flyway-mysql also handles MariaDB (same wire dialect), and the existing
# 112 migrations are MySQL-dialect — MariaDB executes them unchanged.
spring.datasource.url=jdbc:mariadb://127.0.0.1:${APP_DESKTOP_DB_PORT:33306}/ub
spring.datasource.username=${APP_DESKTOP_DB_USER:ub_local}
spring.datasource.password=${APP_DESKTOP_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.flyway.baseline-on-migrate=false

# Single-tenant: the resolver (added in step 2, §5.2) short-circuits to this
# business id. Until that resolver lands the value is unused but already
# threaded through so step 2 is a one-line change.
app.desktop.single-tenant=true
app.desktop.business-id=${APP_DESKTOP_BUSINESS_ID:00000000-0000-0000-0000-000000000000}

# Cloud integrations — explicitly off. The existing cloud beans look at these
# `*.api-key` / `*.access-token` properties and no-op when blank, so we don't
# need new code for the spike.
#
# Disabling `app.media.cloudinary.enabled` deactivates the CloudinaryImageService
# bean (via @ConditionalOnProperty); the LocalMediaStore bean below takes its
# place as the sole MediaStore implementation. They're mutually exclusive on
# purpose so injection is never ambiguous.
app.media.cloudinary.enabled=false
app.media.local.enabled=true
# APP_DATA is set by the Tauri shell (or `bootRun` for dev) to the
# per-OS application-support directory. The fallback below uses ~/.palmart
# so a developer can run `./gradlew bootRun -Pdesktop=true` with no env vars.
app.media.local.dir=${APP_DATA:${user.home}/.palmart}/media
app.media.local.public-base=/media
app.resend.api-key=
app.mailgun.private-api-key=
app.messaging.sms.provider=none
app.messaging.meta-whatsapp.access-token=
app.catalog.ai.deepseek.api-key=
app.notifications.fcm.enabled=false
app.notifications.web-push.enabled=false
app.integrations.webhook.delivery.enabled=false

# In-app notifications still useful offline; outbound dispatch is not.
app.notifications.worker.enabled=true
app.notifications.delivery.worker.enabled=false

# Local-only backups (S3 disabled). Wired in step 10 (§14).
app.integrations.backup.enabled=false
app.integrations.backup.local-dir=${APP_DATA:${user.home}/.palmart}/backups
app.integrations.backup.s3.bucket=
app.integrations.backup.scheduler.enabled=false

# CORS / public-host knobs that mean nothing on a single-tenant loopback box.
CORS_ALLOWED_ORIGINS=
app.security.cors.extra-origin-patterns=
app.tenancy.platform-hosts=

# Public dev / verification niceties — let the desktop UI surface
# verification & password-reset links inline (there is no outbound mail).
app.auth.return-verification-link-in-register-response=true
app.security.test-auth.enabled=false

# Swagger off in a packaged installer.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Public key for offline license verification (DESKTOP_INSTALLATION.md §10).
# Base64-encoded X.509 Ed25519 public key. When blank, only the 30‑day trial
# runs — licenses issued by the vendor will not be verifiable.
app.desktop.license.public-key=${APP_DESKTOP_LICENSE_PUBLIC_KEY:}

# JWT + payment secrets — generated on first install by the Tauri shell (§15).
app.jwt.secret=${APP_JWT_SECRET:}
app.payments.encryption-key=${APP_PAYMENTS_ENCRYPTION_KEY:}

# ESC/POS device bridge (§5.6) — JVM posts to the shell sidecar on loopback.
app.desktop.device.enabled=true
app.desktop.device.sidecar-url=http://127.0.0.1:19500


# Quieter JPA logs once the spike works.
spring.jpa.show-sql=false

# Redis is a cloud-only cache (per `application.properties` comment block);
# JPA owns all repositories. A standalone desktop install must not depend on
# a separate Redis process, so we hide the redis health indicator. The Tauri
# wrapper polls `/actuator/health` to know when the JVM is ready, and it
# would otherwise see DOWN until the user installed and started Redis.
management.health.redis.enabled=false
