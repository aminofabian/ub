# Use: SPRING_PROFILES_ACTIVE=prod (e.g. Coolify). Do not rely on defaults for secrets — set APP_JWT_SECRET and DB credentials via the environment.

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.jpa.open-in-view=false

# Exclude Redis auto-configuration — Redis is only required with the 'cloud' profile.
# When running 'prod' alone (e.g. Coolify), this prevents startup failure if no Redis host is reachable.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
