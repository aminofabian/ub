# Use: SPRING_PROFILES_ACTIVE=prod (e.g. Coolify). Do not rely on defaults for secrets — set APP_JWT_SECRET and DB credentials via the environment.

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.jpa.open-in-view=false

# Coolify / Docker probes: expose Kubernetes-style liveness so the container can
# become healthy as soon as the JVM is up. Redis is cache-only — do not fail the
# whole process health check if Redis flaps during a rolling deploy.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=false
management.endpoint.health.show-details=never

# Phase B notification workers (outbox, stock-low batching, delivery retries, daily digest).
app.notifications.worker.enabled=true
app.notifications.stock-low.flusher.enabled=true
app.notifications.delivery.worker.enabled=true
app.notifications.daily-digest.enabled=true
app.notifications.insights.enabled=true
app.notifications.promo-campaigns.enabled=true

app.global-catalog.jobs.worker.enabled=true

# Set VAPID_PUBLIC_KEY and VAPID_PRIVATE_KEY in the deployment environment.
app.notifications.web-push.enabled=true
app.notifications.fcm.enabled=true
app.notifications.fcm.server-key=${FCM_SERVER_KEY:}
