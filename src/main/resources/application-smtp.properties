# Activate for real SMTP delivery: SPRING_PROFILES_ACTIVE=smtp (plus MAILGUN_SMTP_* or any SMTP host).
# US Mailgun: MAILGUN_SMTP_HOST=smtp.mailgun.org — EU: smtp.eu.mailgun.net
spring.mail.host=${MAILGUN_SMTP_HOST}
spring.mail.port=${MAILGUN_SMTP_PORT:587}
spring.mail.username=${MAILGUN_SMTP_LOGIN}
spring.mail.password=${MAILGUN_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
