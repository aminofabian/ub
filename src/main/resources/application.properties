spring.application.name=ub

# Redis is for cache/RedisTemplate only; JPA owns all Repository interfaces (no @RedisHash).
spring.data.redis.repositories.enabled=false

# Hostname appended as {slug}.{suffix} when super-admin creates a tenant without primaryDomain (override via APP_TENANCY_SLUG_DOMAIN_SUFFIX).
app.tenancy.slug-domain-suffix=${APP_TENANCY_SLUG_DOMAIN_SUFFIX:localhost}

# Native mobile distribution (deep links, platform store URLs, bundle IDs).
app.mobile.api-base-url=${APP_MOBILE_API_BASE_URL:https://api.kiosk.ke}
app.mobile.deep-link-scheme=${APP_MOBILE_DEEP_LINK_SCHEME:kiosk}
app.mobile.universal-link-scheme=${APP_MOBILE_UNIVERSAL_LINK_SCHEME:https}
app.mobile.store-links.ios=${APP_MOBILE_STORE_LINK_IOS:}
app.mobile.store-links.android=${APP_MOBILE_STORE_LINK_ANDROID:}
app.mobile.platform-bundles.shopper=${APP_MOBILE_BUNDLE_SHOPPER:com.kioskke.shopper}
app.mobile.platform-bundles.cashier=${APP_MOBILE_BUNDLE_CASHIER:com.kioskke.cashier}
app.mobile.platform-bundles.grocery=${APP_MOBILE_BUNDLE_GROCERY:com.kioskke.grocery}
app.mobile.platform-bundles.admin=${APP_MOBILE_BUNDLE_ADMIN:com.kioskke.admin}
app.mobile.platform-bundles.stock=${APP_MOBILE_BUNDLE_STOCK:com.kioskke.stock}
# Optional: GitHub Actions dispatch when a tenant requests an App Store build (repository_dispatch).
app.mobile.publish.github-token=${APP_MOBILE_PUBLISH_GITHUB_TOKEN:}
app.mobile.publish.github-repo=${APP_MOBILE_PUBLISH_GITHUB_REPO:}
app.mobile.publish.event-type=${APP_MOBILE_PUBLISH_EVENT_TYPE:mobile-tenant-publish}
# Shared secret for GitHub Actions → POST /webhooks/mobile-publish/status (openssl rand -base64 32).
app.mobile.publish.callback-secret=${APP_MOBILE_PUBLISH_CALLBACK_SECRET:}

server.port=5050
# Honor X-Forwarded-Host / X-Forwarded-Proto from the upstream proxy (Next.js BFF rewrites,
# Cloud Run, Nginx). Without this, requests proxied by the frontend show up with the proxy's
# host (e.g. kiosk.zelisline.com) and the tenant resolver cannot map them back to the
# original tenant domain (e.g. tenant.palmart.co.ke). The tenant resolver also falls back
# to the X-Tenant-Id header, so this is belt-and-suspenders.
server.forward-headers-strategy=NATIVE

# MySQL = this is the database we are using
spring.datasource.url=jdbc:mysql://localhost:3306/ub
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Local MySQL only: schema already had objects but no flyway_schema_history. Prefer a fresh database in production.
spring.flyway.baseline-on-migrate=true

# Header-based test principal (Slice 2 bridge). Never enable in production.
app.security.test-auth.enabled=false

# Slice 3 — JWT + refresh sessions (override in prod).
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.access-ttl-minutes=60

# HttpOnly refresh token cookie (JSON body omits refreshToken when enabled).
app.auth.refresh-token-cookie-enabled=true
app.auth.refresh-cookie-domain=${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
app.auth.refresh-cookie-secure=${APP_AUTH_REFRESH_COOKIE_SECURE:false}
app.jwt.refresh-ttl-days=30
# Revoke refresh when no activity for this many hours (sliding window, updated on refresh).
app.auth.idle-timeout-hours=12

# Browser-facing frontend (no trailing slash). Set APP_PUBLIC_FRONTEND_BASE_URL in prod.
app.public.frontend-base-url=${APP_PUBLIC_FRONTEND_BASE_URL:http://localhost:3000}
# Optional overrides; defaults join frontend-base-url + path (align with NEXT_PUBLIC_APP_BASE_URL).
app.public.email-verification-url-prefix=${APP_PUBLIC_EMAIL_VERIFICATION_URL_PREFIX:${app.public.frontend-base-url}/verify-email?token=}
app.public.password-reset-url-prefix=${APP_PUBLIC_PASSWORD_RESET_URL_PREFIX:${app.public.frontend-base-url}/reset-password?token=}
# Documented for tooling / parity with NEXT_PUBLIC_API_BASE_URL (not all code paths read this yet).
app.public.api-base-url=${API_PUBLIC_BASE_URL:http://localhost:5050}
# AES-256 key for payment gateway credentials at rest (base64-encoded 32 bytes). Required in production.
# Generate: openssl rand -base64 32
app.payments.encryption-key=${APP_PAYMENTS_ENCRYPTION_KEY:}
# Hostnames that host the platform itself (API base URL, admin login apex). The
# tenant resolver bypasses these like localhost — controllers fall back to
# X-Tenant-Id or to public/non-tenant paths. Comma-separated, no scheme/port.
# Defaults to the canonical API + apex; override via env to add staging hosts.
app.tenancy.platform-hosts=${APP_TENANCY_PLATFORM_HOSTS:kiosk.zelisline.com,palmart.co.ke,www.palmart.co.ke}
app.auth.password-reset-ttl-hours=1
app.auth.self-signup-enabled=true
# Role for self-signup when the tenant already has at least one user. The very first user in a tenant always gets owner.
app.auth.signup-role-key=buyer
# Optional: when set, POST /api/v1/auth/register may include "staffInviteToken" matching this value to assign staff-signup-role-key instead of signup-role-key (first user in tenant is still always owner).
app.auth.staff-signup-token=${APP_AUTH_STAFF_SIGNUP_TOKEN:}
app.auth.staff-signup-role-key=viewer
# true = sign-ups are INVITED until verify-email; resend-verification only applies to those users.
# false = sign-ups are ACTIVE immediately — resend-verification will not send (no pending verification).
# Without Resend/Mailgun API keys or SMTP (profile smtp), outbound mail is only logged.
app.auth.email-verification-required=true
# When true, register (and resend when a link is issued) expose the verify URL in JSON for dev / broken mail.
app.auth.return-verification-link-in-register-response=${APP_AUTH_RETURN_VERIFICATION_LINK:false}
app.auth.email-verification-ttl-hours=48
app.security.login-rate-limit-per-minute=5
app.security.refresh-rate-limit-per-minute=30
# Phase 15 — GET /api/v1/public/** (per client IP + path slug); returns 429 + Retry-After when exceeded.
app.security.public-storefront-rate-limit-per-minute=120
# Phase 5 — POST /api/v1/public/credits/** (per client IP); tighter cap because each call may mutate AR state.
app.security.public-credit-claim-rate-limit-per-minute=10

# Resend (backend only). Prefer over Mailgun when RESEND_API_KEY is set.
# From must use a domain verified in Resend (or set RESEND_FROM to a full "Name <addr@domain>" value).
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:}
app.resend.domain=${RESEND_DOMAIN:}

# Mailgun (backend only). API key: MAILGUN_PRIVATE_API_KEY, or API_KEY (Mailgun sample name). Domain: MAILGUN_DOMAIN.
# Optional explicit From (must be on your verified domain), e.g. UB <noreply@mg.example.com>
app.mailgun.from=${MAILGUN_FROM:}
app.mailgun.region=${MAILGUN_REGION:us}
app.mailgun.domain=${MAILGUN_DOMAIN:}
app.mailgun.private-api-key=${MAILGUN_PRIVATE_API_KEY:${API_KEY:}}
app.mailgun.public-validation-key=${MAILGUN_PUBLIC_VALIDATION_KEY:}
app.mailgun.webhook-signing-key=${MAILGUN_WEBHOOK_SIGNING_KEY:}

# OpenAPI 3.1 — contract snapshot: docs/openapi/phase-1.yaml (see OpenApiExportIT).
# Public storefront (Phase 15, sessionless): docs/openapi/phase-15-storefront-public.yaml
springdoc.api-docs.path=/api/v1/openapi
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.version=OPENAPI_3_1
springdoc.writer-with-default-pretty-printer=true

# Browser origins allowed by Spring Security CORS (exact match to Origin header). Override via env CORS_ALLOWED_ORIGINS in prod.
CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,https://palmart.co.ke,https://www.palmart.co.ke
# Wildcard patterns (subdomains, zelisline admin hosts) — see SecurityConfig. Override via CORS_EXTRA_ORIGIN_PATTERNS.
# IMPORTANT: https://*.palmart.co.ke does NOT match the apex domain palmart.co.ke (the * requires a subdomain).
# Include the apex domain explicitly so CORS works even when CORS_ALLOWED_ORIGINS is overridden in prod.
app.security.cors.extra-origin-patterns=${CORS_EXTRA_ORIGIN_PATTERNS:https://*.palmart.co.ke,https://palmart.co.ke,https://*.kiosk.ke,https://kiosk.ke,https://*.zelisline.com}

# Multipart (catalog image upload to Cloudinary)
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

# Cloudinary — use CLOUDINARY_URL (recommended) or CLOUDINARY_CLOUD_NAME + CLOUDINARY_API_KEY + CLOUDINARY_API_SECRET.
# When APP_MEDIA_CLOUDINARY_ENABLED is unset, uploads auto-enable if all three values are non-blank (after URL parse).
# Opt out explicitly with APP_MEDIA_CLOUDINARY_ENABLED=false.
app.media.cloudinary.enabled=${APP_MEDIA_CLOUDINARY_ENABLED:true}
app.media.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.media.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.media.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Phase 5 — M-Pesa STK simulation webhook (leave empty to reject completion callbacks).
app.payments.mpesa-stk-simulate-secret=${MPESA_STK_SIMULATE_SECRET:}
# Local STK rows still pending after this many seconds are marked failed so cashier/storefront can retry (KopoKopo may still block longer).
app.payments.stk.stale-pending-seconds=${APP_PAYMENTS_STK_STALE_PENDING_SECONDS:30}
# Supplier Send Money rows still pending after this are marked failed so the pay drawer stops polling.
app.payments.send-money.stale-pending-seconds=${APP_PAYMENTS_SEND_MONEY_STALE_PENDING_SECONDS:180}
# Recurring balance reminder sweep (Phase 5 Slice 6). Enable with app.credits.reminders.enabled=true.
# Sends WhatsApp/SMS every interval-days to customers with an outstanding tab balance.
app.credits.reminders.enabled=false
app.credits.reminders.cron=0 0 8 * * *
app.credits.reminders.interval-days=3
app.credits.reminders.min-balance=1.00
app.credits.reminders.max-count=5
app.credits.reminders.zone=Africa/Nairobi

# Credit tab sale reminders — per-tenant toggles live in business_credit_settings (admin UI).
# Env vars below are optional fallbacks when a tenant has not saved keys in admin yet.
app.messaging.credit-sale-reminder.payment-account-url=${APP_CREDIT_SALE_REMINDER_PAYMENT_URL:https://palmart.co.ke/shop/account}
# Product description AI (DeepSeek via RapidAPI)
app.catalog.ai.deepseek.api-key=${RAPIDAPI_DEEPSEEK_KEY:${RAPIDAPI_KEY:}}
app.catalog.ai.deepseek.host=${RAPIDAPI_DEEPSEEK_HOST:deepseek-v31.p.rapidapi.com}
app.catalog.ai.deepseek.url=${RAPIDAPI_DEEPSEEK_URL:https://deepseek-v31.p.rapidapi.com/}
app.catalog.ai.deepseek.model=${RAPIDAPI_DEEPSEEK_MODEL:DeepSeek-V3-0324}

app.messaging.rapid-api-whatsapp.api-key=${RAPIDAPI_KEY:}
app.messaging.rapid-api-whatsapp.host=${RAPIDAPI_WHATSAPP_HOST:whatsapp-osint.p.rapidapi.com}
app.messaging.rapid-api-whatsapp.lookup-url=${RAPIDAPI_WHATSAPP_LOOKUP_URL:https://whatsapp-osint.p.rapidapi.com/bizos}
app.messaging.meta-whatsapp.access-token=${WHATSAPP_META_ACCESS_TOKEN:}
app.messaging.meta-whatsapp.phone-number-id=${WHATSAPP_META_PHONE_NUMBER_ID:}
app.messaging.meta-whatsapp.graph-version=${WHATSAPP_META_GRAPH_VERSION:v25.0}
# Meta webhook: Callback URL = ${API_PUBLIC_BASE_URL}/webhooks/whatsapp (same verify token in Meta dashboard).
app.messaging.meta-whatsapp.webhook-verify-token=${WHATSAPP_META_WEBHOOK_VERIFY_TOKEN:}
app.messaging.meta-whatsapp.app-secret=${WHATSAPP_META_APP_SECRET:}
# SMS: none (log only) | africas_talking
app.messaging.sms.provider=${SMS_PROVIDER:none}
app.messaging.sms.africas-talking-username=${AFRICAS_TALKING_USERNAME:}
app.messaging.sms.africas-talking-api-key=${AFRICAS_TALKING_API_KEY:}

# Phase 6 — recurring expense generation/posting sweep.
app.finance.recurring-expenses.enabled=true
app.finance.recurring-expenses.cron=0 5 2 * * *

# Phase 7 Slice 1 — MV summary refresh (disabled by default; see ReportingRefreshScheduler).
app.reporting.refresh.enabled=false
app.reporting.refresh.cron=0 5 * * * *
app.reporting.refresh.zone=UTC

# Phase B — notification outbox, batching, delivery retries (workers off by default in dev).
app.notifications.outbox.enabled=true
app.notifications.worker.enabled=false
app.notifications.worker.fixed-delay-ms=5000
app.notifications.worker.initial-delay-ms=8000
app.notifications.stock-low.batch-window-minutes=15
app.notifications.stock-low.flusher.enabled=false
app.notifications.stock-low.flusher.fixed-delay-ms=60000
app.notifications.stock-low.flusher.initial-delay-ms=30000
app.notifications.delivery.worker.enabled=false
app.notifications.delivery.worker.fixed-delay-ms=20000
app.notifications.delivery.worker.initial-delay-ms=10000
app.notifications.delivery.max-attempts=8
app.notifications.daily-digest.enabled=false
app.notifications.daily-digest.cron=0 0 20 * * *
app.notifications.daily-digest.zone=Africa/Nairobi

# Daily stock audit — random sample of products sold yesterday (branch-scoped manifest).
# Per-business override: inventory.stocktake.dailyAuditSampleSize (Business settings → Stock take).
app.inventory.daily-stock-audit.enabled=true
app.inventory.daily-stock-audit.cron=0 0 6 * * *
app.inventory.daily-stock-audit.zone=Africa/Nairobi
app.inventory.daily-stock-audit.sample-size=25
app.notifications.insights.enabled=false
app.notifications.insights.zone=Africa/Nairobi
app.notifications.insights.abandoned-cart.cron=0 0 9 * * *
app.notifications.insights.peak-hours.cron=0 0 8 * * *
app.notifications.insights.top-products.cron=0 0 7 * * MON
app.notifications.abandoned-cart.stale-hours=24
app.notifications.win-back.cron=0 0 10 * * MON
app.notifications.win-back.inactive-days=30
app.notifications.promo-campaigns.enabled=false
app.notifications.promo-campaigns.poll-ms=60000

# Phase C — Web Push (generate keys: npx web-push generate-vapid-keys)
# After STK success, optionally skip manual confirm step (sends order.confirmed immediately).
app.storefront.web-orders.auto-confirm-on-paid=false

app.notifications.fcm.enabled=false
app.notifications.fcm.server-key=${FCM_SERVER_KEY:}
app.notifications.web-push.enabled=false
app.notifications.web-push.vapid-public-key=${VAPID_PUBLIC_KEY:}
app.notifications.web-push.vapid-private-key=${VAPID_PRIVATE_KEY:}
app.notifications.web-push.subject=mailto:notifications@palmart.co.ke

# Phase 7 Slice 6 — overdue AP inbox notifications (disabled by default).
app.phase7.notifications.enabled=false
app.phase7.notifications.overdue-ap.cron=0 15 8 * * *
app.phase7.notifications.zone=UTC

# Phase 8 Slice 1 — integration API keys (per-key sliding window, requests/minute).
app.integrations.api-key.requests-per-minute=120

# Phase 8 Slice 2 — outbound webhooks (transactional enqueue + async HTTP). Scheduler off by default.
app.integrations.webhook.delivery.enabled=false
app.integrations.webhook.delivery.fixed-delay-ms=15000
app.integrations.webhook.delivery.initial-delay-ms=5000
app.integrations.webhook.delivery.http-timeout-seconds=15
app.integrations.webhook.delivery.max-attempts=12
# Phase 8 Slice 3 — async CSV import jobs (worker off by default for dev/tests).
app.integrations.import.jobs.storage-dir=${java.io.tmpdir}/ub-import-jobs
app.integrations.import.jobs.worker.enabled=false
app.integrations.import.jobs.worker.poll-interval-ms=4000
app.integrations.import.jobs.worker.initial-delay-ms=8000

# Phase 8 Slice 4 — encrypted DB backup (mysqldump / pg_dump → AES-GCM → S3 or local dir). Disabled by default.
app.integrations.backup.enabled=false
app.integrations.backup.encryption.passphrase=${BACKUP_ENCRYPTION_PASSPHRASE:}
app.integrations.backup.local-dir=${BACKUP_LOCAL_DIR:}
app.integrations.backup.object-prefix=db-backups
app.integrations.backup.retention-days=30
app.integrations.backup.scheduler.enabled=false
app.integrations.backup.scheduler.cron=0 0 3 * * *
app.integrations.backup.scheduler.zone=UTC
app.integrations.backup.s3.bucket=${BACKUP_S3_BUCKET:${STORAGE_BUCKET:}}
app.integrations.backup.s3.region=${AWS_REGION:eu-west-1}
app.integrations.backup.s3.endpoint=${STORAGE_ENDPOINT:}
app.integrations.backup.s3.access-key=${STORAGE_ACCESS_KEY:}
app.integrations.backup.s3.secret-key=${STORAGE_SECRET_KEY:}
app.integrations.backup.s3.path-style=${STORAGE_PATH_STYLE:false}
app.integrations.backup.s3.default-credentials-chain=false

# Phase 9 Slice 0 — WebSocket realtime layer (ticket TTL, connection limits).
app.realtime.ticket.ttl-seconds=60
app.realtime.max-connections-per-user=5
app.realtime.max-connections-per-business=50

# Phase 8 Slice 6 — hardening (API-key brute-force throttle per IP; webhook SSRF on subscription URL).
app.integrations.api-key.invalid-attempts-per-minute-per-ip=40
app.integrations.webhook.allow-loopback-and-rfc1918-targets=false
app.integrations.webhook.ssrf.resolve-hostnames=true
app.integrations.webhook.ssrf.resolve-timeout-ms=1500
