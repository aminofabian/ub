spring.application.name=ub

# Redis is for cache/RedisTemplate only; JPA owns all Repository interfaces (no @RedisHash).
spring.data.redis.repositories.enabled=false

# Hostname appended as {slug}.{suffix} when super-admin creates a tenant without primaryDomain (override via APP_TENANCY_SLUG_DOMAIN_SUFFIX).
app.tenancy.slug-domain-suffix=${APP_TENANCY_SLUG_DOMAIN_SUFFIX:localhost}

server.port=5050

# MySQL = this is the database we are using
spring.datasource.url=jdbc:mysql://localhost:3306/ub
spring.datasource.username=root
spring.datasource.password=00870087Fab.#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Local MySQL only: schema already had objects but no flyway_schema_history. Prefer a fresh database in production.
spring.flyway.baseline-on-migrate=true

# Header-based test principal (Slice 2 bridge). Never enable in production.
app.security.test-auth.enabled=false

# Slice 3 — JWT + refresh sessions (override in prod).
app.jwt.secret=dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=30

# Browser-facing frontend (no trailing slash). Set APP_PUBLIC_FRONTEND_BASE_URL in prod.
app.public.frontend-base-url=${APP_PUBLIC_FRONTEND_BASE_URL:http://localhost:3000}
# Optional overrides; defaults join frontend-base-url + path (align with NEXT_PUBLIC_APP_BASE_URL).
app.public.email-verification-url-prefix=${APP_PUBLIC_EMAIL_VERIFICATION_URL_PREFIX:${app.public.frontend-base-url}/verify-email?token=}
app.public.password-reset-url-prefix=${APP_PUBLIC_PASSWORD_RESET_URL_PREFIX:${app.public.frontend-base-url}/reset-password?token=}
# Documented for tooling / parity with NEXT_PUBLIC_API_BASE_URL (not all code paths read this yet).
app.public.api-base-url=${API_PUBLIC_BASE_URL:http://localhost:5050}
app.auth.password-reset-ttl-hours=1
app.auth.self-signup-enabled=true
# Role for self-signup when the tenant already has at least one user. The very first user in a tenant always gets owner.
app.auth.signup-role-key=viewer
# true = sign-ups are INVITED until verify-email; resend-verification only applies to those users.
# false = sign-ups are ACTIVE immediately — resend-verification will not send (no pending verification).
# Without Resend/Mailgun API keys or SMTP (profile smtp), outbound mail is only logged.
app.auth.email-verification-required=true
app.auth.email-verification-ttl-hours=48
app.security.login-rate-limit-per-minute=5
# Phase 15 — GET /api/v1/public/** (per client IP + path slug); returns 429 + Retry-After when exceeded.
app.security.public-storefront-rate-limit-per-minute=120

# Resend (backend only). Prefer over Mailgun when RESEND_API_KEY is set.
# From must use a domain verified in Resend (or set RESEND_FROM to a full "Name <addr@domain>" value).
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:}
app.resend.domain=${RESEND_DOMAIN:}

# Mailgun (backend only). API key: MAILGUN_PRIVATE_API_KEY, or API_KEY (Mailgun sample name). Domain: MAILGUN_DOMAIN.
# Optional explicit From (must be on your verified domain), e.g. UB <noreply@mg.example.com>
app.mailgun.from=${MAILGUN_FROM:}
app.mailgun.region=${MAILGUN_REGION:us}
app.mailgun.domain=${MAILGUN_DOMAIN:}
app.mailgun.private-api-key=${MAILGUN_PRIVATE_API_KEY:${API_KEY:}}
app.mailgun.public-validation-key=${MAILGUN_PUBLIC_VALIDATION_KEY:}
app.mailgun.webhook-signing-key=${MAILGUN_WEBHOOK_SIGNING_KEY:}

# OpenAPI 3.1 — contract snapshot: docs/openapi/phase-1.yaml (see OpenApiExportIT).
# Public storefront (Phase 15, sessionless): docs/openapi/phase-15-storefront-public.yaml
springdoc.api-docs.path=/api/v1/openapi
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.version=OPENAPI_3_1
springdoc.writer-with-default-pretty-printer=true

# Browser origins allowed by Spring Security CORS (exact match to Origin header). Override via env CORS_ALLOWED_ORIGINS in prod.
CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,https://palmart.co.ke,https://www.palmart.co.ke
# Wildcard patterns (subdomains, zelisline admin hosts) — see SecurityConfig. Override via CORS_EXTRA_ORIGIN_PATTERNS.
app.security.cors.extra-origin-patterns=${CORS_EXTRA_ORIGIN_PATTERNS:https://*.palmart.co.ke,https://*.zelisline.com}

# Multipart (catalog image upload to Cloudinary)
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB

# Cloudinary — use CLOUDINARY_URL (recommended) or CLOUDINARY_CLOUD_NAME + CLOUDINARY_API_KEY + CLOUDINARY_API_SECRET.
# When APP_MEDIA_CLOUDINARY_ENABLED is unset, uploads auto-enable if all three values are non-blank (after URL parse).
# Opt out explicitly with APP_MEDIA_CLOUDINARY_ENABLED=false.
app.media.cloudinary.enabled=${APP_MEDIA_CLOUDINARY_ENABLED:false}
app.media.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.media.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.media.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Phase 5 — M-Pesa STK simulation webhook (leave empty to reject completion callbacks).
app.payments.mpesa-stk-simulate-secret=${MPESA_STK_SIMULATE_SECRET:}
# Overdue-tab reminder sweep (stub; wire SMS/email later).
app.credits.reminders.enabled=false
app.credits.reminders.cron=0 0 8 * * *

# Phase 6 — recurring expense generation/posting sweep.
app.finance.recurring-expenses.enabled=true
app.finance.recurring-expenses.cron=0 5 2 * * *

