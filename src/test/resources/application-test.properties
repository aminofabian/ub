spring.datasource.url=jdbc:h2:mem:ubtest;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

# Slice 2 bridge: header-based tenant principal for @PreAuthorize ITs (disabled in prod).
app.security.test-auth.enabled=true

app.jwt.secret=test-test-test-test-test-test-test-test-test-test-test-test-test-test-test-test-test-test-test
app.jwt.access-ttl-minutes=15
app.jwt.refresh-ttl-days=30

app.public.password-reset-url-prefix=http://localhost:5173/reset-password?token=
app.auth.password-reset-ttl-hours=1
app.security.login-rate-limit-per-minute=5
